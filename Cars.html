<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cars Gallery</title>

<style>

body{
margin:0;
background:#000814;
font-family:Arial;
color:white;
}

.header{
background:linear-gradient(90deg,#ff0000,#0066ff);
padding:15px;
text-align:center;
position:sticky;
top:0;
}

.back{
color:white;
text-decoration:none;
font-size:18px;
float:left;
}

h2{
margin:0;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.gallery img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
}

.viewer img{
max-width:95%;
max-height:95%;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<a class="back" href="Index.html">⬅ Back</a>
<h2>Cars Gallery</h2>
</div>

<div class="gallery">

<img src="Images/Cars/car1.png" onclick="openImg(this.src)">
<img src="Images/Cars/car2.png" onclick="openImg(this.src)">
<img src="Images/Cars/car3.png" onclick="openImg(this.src)">
<img src="Images/Cars/car4.png" onclick="openImg(this.src)">

</div>

<div class="viewer" id="viewer">
<span class="close" onclick="closeImg()">×</span>
<img id="bigImg">
</div>

<script>

function openImg(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("bigImg").src=src;
}

function closeImg(){
document.getElementById("viewer").style.display="none";
}

</script>

</body>
</html>
